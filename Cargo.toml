[package]
name = "hail-decoder"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "Pure Rust decoder for Hail table format"
license = "MIT OR Apache-2.0"

[dependencies]
# Compression
zstd = "0.13"

# Arrow and Parquet
arrow = "53.3"
parquet = "53.3"

# Cloud storage
object_store = { version = "0.9", features = ["gcp", "aws"] }

# Parsing
nom = "7.1"

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Compression
flate2 = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
tempfile = "3.8"
criterion = "0.5"

# Benchmarks will be added later
# [[bench]]
# name = "decoder_bench"
# harness = false

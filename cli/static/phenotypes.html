<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genohype - All Phenotypes</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --accent: #58a6ff;
    --cyan: #39c5cf;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
    font-size: 12px;
  }
  h1 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .back-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 11px;
  }
  .back-link:hover { text-decoration: underline; }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: center;
  }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    width: 250px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { background: var(--surface-hover); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }

  .stats {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .table-scroll {
    max-height: calc(100vh - 150px);
    overflow-y: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: rgba(255,255,255,0.02);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tr:hover { background: var(--surface-hover); }
  .phenotype-id {
    color: var(--accent);
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stage {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    display: inline-block;
  }
  .stage.queued { background: rgba(125,133,144,0.15); color: var(--text-dim); }
  .stage.scanning { background: rgba(57,197,207,0.15); color: var(--cyan); }
  .stage.aggregating { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .stage.completed { background: rgba(63,185,80,0.15); color: var(--green); }
  .stage.failed { background: rgba(248,81,73,0.15); color: var(--red); }

  .progress { font-variant-numeric: tabular-nums; }
  .duration { font-variant-numeric: tabular-nums; color: var(--text-dim); }
  .result-info { font-size: 10px; color: var(--text-dim); }
  .result-info span { margin-right: 8px; }
  .sig-count { color: var(--green); }
  .loci-count { color: var(--cyan); }

  .no-data { text-align: center; padding: 40px; color: var(--text-dim); }
</style>
</head>
<body>
  <div class="header">
    <h1>ALL PHENOTYPES</h1>
    <a href="/dashboard" class="back-link">← Back to Dashboard</a>
  </div>

  <div class="controls">
    <input type="text" class="search-input" id="search" placeholder="Search phenotypes...">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="scanning">Scanning</button>
    <button class="filter-btn" data-filter="aggregating">Aggregating</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="failed">Failed</button>
    <button class="filter-btn" data-filter="queued">Queued</button>
    <span class="stats" id="stats">Loading...</span>
  </div>

  <div class="table-container">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Phenotype</th>
            <th>Stage</th>
            <th>Progress</th>
            <th>Duration</th>
            <th>Results</th>
          </tr>
        </thead>
        <tbody id="phenotype-table">
          <tr><td colspan="5" class="no-data">Loading phenotypes...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script>
let allPhenotypes = [];
let currentFilter = 'all';
let searchQuery = '';

async function fetchPhenotypes() {
  try {
    const res = await fetch('/api/dashboard/batch');
    const data = await res.json();
    allPhenotypes = data.phenotypes || [];
    render();
  } catch (err) {
    console.error('Failed to fetch phenotypes:', err);
    document.getElementById('phenotype-table').innerHTML =
      '<tr><td colspan="5" class="no-data">Failed to load phenotypes</td></tr>';
  }
}

function render() {
  let filtered = allPhenotypes;

  // Apply stage filter
  if (currentFilter !== 'all') {
    filtered = filtered.filter(p => p.stage === currentFilter);
  }

  // Apply search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p => p.id.toLowerCase().includes(q));
  }

  // Sort: active first, then by id
  const sortOrder = { 'scanning': 0, 'aggregating': 1, 'failed': 2, 'completed': 3, 'queued': 4 };
  filtered.sort((a, b) => {
    const ao = sortOrder[a.stage] ?? 5;
    const bo = sortOrder[b.stage] ?? 5;
    if (ao !== bo) return ao - bo;
    return a.id.localeCompare(b.id);
  });

  // Update stats
  const total = allPhenotypes.length;
  const showing = filtered.length;
  document.getElementById('stats').textContent =
    `Showing ${showing} of ${total} phenotypes`;

  // Render table
  const tbody = document.getElementById('phenotype-table');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="no-data">No phenotypes match filter</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(p => {
    const shortId = p.id.split('/').slice(-2).join('/');
    const progress = p.partitions_total > 0
      ? `${p.partitions_done} / ${p.partitions_total}`
      : '--';

    // Format duration
    let durationStr = '--';
    if (p.duration_secs) {
      const secs = p.duration_secs;
      if (secs >= 3600) {
        durationStr = `${(secs / 3600).toFixed(1)}h`;
      } else if (secs >= 60) {
        durationStr = `${(secs / 60).toFixed(1)}m`;
      } else {
        durationStr = `${secs.toFixed(0)}s`;
      }
    }

    let resultInfo = '';
    if (p.result) {
      const r = p.result;
      resultInfo = `
        <span class="sig-count">${(r.exome_sig_count || 0) + (r.genome_sig_count || 0)} sig</span>
        <span class="loci-count">${r.total_loci || 0} loci</span>
      `;
    }

    return `
      <tr>
        <td class="phenotype-id" title="${p.id}">${shortId}</td>
        <td><span class="stage ${p.stage}">${p.stage}</span></td>
        <td class="progress">${progress}</td>
        <td class="duration">${durationStr}</td>
        <td class="result-info">${resultInfo}</td>
      </tr>
    `;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Search input
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

// Initial fetch and poll every 5 seconds
fetchPhenotypes();
setInterval(fetchPhenotypes, 5000);
</script>
</body>
</html>
